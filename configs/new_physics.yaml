name: new_physics
description: "New Physics Bench: RG-tail frequency-domain inspiral waveform (arXiv:2602.08833)"

# Scoring: PyCBC frequency-domain mismatch (aLIGO PSD)
f_low_hz: 15.0
f_high_hz: 990.0
delta_f: 0.125

# Test-case parameter grid (4 x 4 x 3 x 3 = 144 cases)
parameters:
  chirp_mass_msun: [12.0, 20.0, 28.3, 40.0]
  eta: [0.12, 0.16, 0.22, 0.247]
  distance_mpc: [200.0, 410.0, 1000.0]
  lambda_RG: [0.8, 1.0, 1.2]

# Fixed parameters for all test cases
fixed:
  tc: 0.0
  phic: 0.0
  fmax_over_fisco: 1.0
  sigma_taper_over_fisco: 0.01
  phase_only: false
