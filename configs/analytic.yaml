name: analytic
description: "Analytic surrogate waveform for non-spinning BBH"


# Loss: mean frequency-domain mismatch (aLIGO PSD) over fd_masses_msun
fd_masses_msun: [40.0, 80.0, 120.0, 160.0, 200.0]
f_low_hz: 15.0
f_high_hz: 990.0

# Input parameter ranges
parameters:
  q: [1.0, 20.0]

# Validation requirements (checked qualitatively or via automated tests)
# - correct equal-mass limit
# - smooth behavior in q
# - correct test-mass trend near q=20
# - no unphysical oscillations

# Dataset
dataset:
  n_train: null
  n_test: null
  held_out_regions: []
