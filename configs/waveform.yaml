name: waveform
description: "Co-precessing h22 waveform prediction"


# Loss: mean frequency-domain mismatch (aLIGO PSD) over fd_masses_msun
fd_masses_msun: [40.0, 80.0, 120.0, 160.0, 200.0]
f_low_hz: 15.0
f_high_hz: 990.0

# Input parameter ranges
parameters:
  q: [1.0, 10.0]
  chi1_mag: [0.0, 0.8]
  chi2_mag: [0.0, 0.8]

# Dataset
dataset:
  n_train: null       # to be specified
  n_test: null
  held_out_regions: []  # parameter regions excluded from training
